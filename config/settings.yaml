server:
  host: "0.0.0.0"
  port: 8000
  pi5_ip: "10.26.9.196"
  pi5_port: 8766
  pi5_face_port: 7000

llm:
  provider: "vllm"
  base_url: "http://localhost:8080/v1"
  # HuggingFace model name — must match what vLLM is started with:
  # python -m vllm.entrypoints.openai.api_server \
  #   --model scb10x/llama3.1-typhoon2-70b-instruct \
  #   --dtype bfloat16 --tensor-parallel-size 4 \
  #   --max-model-len 4096 --port 8080
  model: "scb10x/llama3.1-typhoon2-70b-instruct"
  timeout: 60
  temperature: 0.65
  max_tokens: 150
  top_k: 30
  top_p: 0.85
  repeat_penalty: 1.05
  num_ctx: 4096

llm_fast:
  provider: "ollama"
  base_url: "http://localhost:11434/v1"
  model: "hf.co/mradermacher/llama3.1-typhoon2-8b-instruct-GGUF:Q5_K_M"
  timeout: 15
  temperature: 0.3
  max_tokens: 150
  top_k: 30
  top_p: 0.85
  repeat_penalty: 1.1
  num_ctx: 4096

milvus:
  host: "localhost"
  port: 19530
  memory_collection: "conversation_memory"   # new — session memory
  # existing RAG collections (shared with final_docker_component)
  curriculum_collection: "curriculum"
  uni_info_collection: "uni_info"
  time_table_collection: "time_table"
  # new RAG collections
  local_info_collection: "local_info"        # bars.json + restaurents.json
  student_manual_collection: "student_manual" # student_manual_2564.pdf
  embedding_model: "BAAI/bge-m3"
  embedding_dim: 1024
  top_k: 3

tts:
  mode: "server"                 # "server" = WAV → PI 5 | "pi5" = phoneme text → PI 5
  engine: "typhoon_audio"        # "typhoon_audio" = sidecar | "khanomtan" = local pythaitts
  speaker: "Tsyncone"            # Satu / KhanomTan TTS v1.0 speaker (used only when engine=khanomtan)
  language: "th-th"

audio_service:
  base_url: "http://localhost:8001"   # Typhoon2-Audio sidecar (Python 3.10)
  stt_enabled: false                  # true = PI 5 sends WAV to /audio_detection (Phase B)
  timeout: 15.0

session:
  greeting_cooldown_seconds: 300
  session_timeout_seconds: 1800        # registered persons — 30 min
  guest_session_timeout_seconds: 300   # unknown persons — 5 min
  student_gone_reprompt_seconds: 15    # silence before "ยังอยู่ที่นี่ไหมคะ" reprompt
  student_gone_roam_seconds: 15        # silence after reprompt before resuming roam
  max_history_turns: 5

thresholds:
  detection_confidence: 0.75
  stt_confidence: 0.6

pi5_ros2:
  host: "10.26.3.203"
  port: 8767

sqlite:
  db_path: "./database/metadata.db"

mysql:
  host: "localhost"
  port: 3306
  user: "root"
  password: "root"
  database: "capstone"
